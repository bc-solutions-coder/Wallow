mode: ContinuousDeployment
tag-prefix: 'v'
branches:
  main:
    mode: ContinuousDelivery
    tag: ''
    increment: Patch
    source-branches:
      - develop
  develop:
    regex: ^dev(elop)?(ment)?$
    mode: ContinuousDeployment
    tag: dev
    increment: Minor
    source-branches: []
  feature:
    regex: ^(feature|feat|fix|chore|refactor|docs|test|ci|style|perf|build)[/-]
    mode: ContinuousDeployment
    tag: useBranchName
    increment: Inherit
    source-branches:
      - develop
      - main
