# docker-compose.prod.yml
# Production environment overrides

services:
  app:
    ports:
      - "8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  postgres:
    # No external ports in production
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  rabbitmq:
    # No external ports in production, use minimal image without management UI
    image: rabbitmq:4.2-alpine
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
