# Foundry Helm Chart - Development Environment Values
# Usage: helm install foundry ./foundry -f foundry/values-dev.yaml

replicaCount: 1

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

resources:
  requests:
    memory: 128Mi
    cpu: 250m
  limits:
    memory: 256Mi
    cpu: 500m

config:
  ASPNETCORE_ENVIRONMENT: Development

secrets:
  ConnectionStrings__DefaultConnection: "Host=foundry-postgresql:5432;Database=foundry;Username=foundry;Password=foundry"
  ConnectionStrings__Redis: "foundry-valkey-master:6379"
  ConnectionStrings__RabbitMq: "amqp://foundry:foundry@foundry-rabbitmq:5672/"

# -- Enable in-cluster infrastructure subcharts
postgresql:
  enabled: true
  auth:
    username: foundry
    password: foundry
    database: foundry

rabbitmq:
  enabled: true
  auth:
    username: foundry
    password: foundry

valkey:
  enabled: true
  auth:
    enabled: false
