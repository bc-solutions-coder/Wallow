apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: foundry-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - foundry.example.com
      secretName: foundry-tls
  rules:
    - host: foundry.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: foundry
                port:
                  number: 80
