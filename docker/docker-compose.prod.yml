# docker-compose.prod.yml
# Production environment - no Mailpit, external secrets, enhanced logging

services:
  postgres:
    # No external ports
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1G

  rabbitmq:
    # No external ports
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M

  # No Mailpit in production - use real SMTP service
